kind = "web"
previewPath = "/"
title = "Planning Copilot"
version = "1.0.0"
id = "artifacts/planning-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23224

[services.development]
run = "pnpm --filter @workspace/planning-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/planning-copilot", "run", "build" ]
publicDir = "artifacts/planning-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23224"
BASE_PATH = "/"
